name: Crawl OliveYoung Rankings

on:
  schedule:
    # GitHub Actions cron은 UTC 기준입니다.
    # 한국시간 09:00 = UTC 00:00
    # 한국시간 15:00 = UTC 06:00
    # 한국시간 21:00 = UTC 12:00
    - cron: "0 0,6,12 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: |
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Run crawler
        run: |
          python crawler.py

      - name: Commit updated database
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/oliveyoung_rank.db

          if git diff --cached --quiet; then
            echo "No database changes to commit."
          else
            git commit -m "Update OliveYoung ranking database"
            git push
          fi