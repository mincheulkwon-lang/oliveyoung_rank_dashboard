name: Crawl OliveYoung Rankings

on:
  schedule:
    # GitHub Actions cron은 UTC 기준입니다.
    # 예약 실행 지연을 고려해 목표 시간보다 약 2시간 빠르게 설정합니다.
    #
    # 목표 한국시간 07시 전후 → 예약 한국시간 05:10 = UTC 20:10
    # 목표 한국시간 11시 전후 → 예약 한국시간 09:10 = UTC 00:10
    # 목표 한국시간 14시 전후 → 예약 한국시간 12:10 = UTC 03:10
    # 목표 한국시간 17시 전후 → 예약 한국시간 15:10 = UTC 06:10
    # 목표 한국시간 21시 전후 → 예약 한국시간 19:10 = UTC 10:10
    - cron: "10 20,0,3,6,10 * * *"

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: oliveyoung-crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: |
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Run crawler
        run: |
          python crawler.py

      - name: Commit updated database
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/oliveyoung_rank.db

          if git diff --cached --quiet; then
            echo "No database changes to commit."
          else
            git commit -m "Update OliveYoung ranking database"

            echo "Pull latest remote changes before push"
            git pull --rebase origin main

            echo "Push updated database"
            git push origin main
          fi